<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>목록 태그 실습</title>
    </head>
    <body>
        <h3>목록 태그</h3>

        
        <h4>순서가 없는 목록</h4>
            <ul><!--Unorder list-->
                <li>한국</li><!-- list -->
                <li>미국</li>
                <li>일본</li>
                <li>중국</li>
                <li>호주</li>
            </ul>
        <h4>순서가 있는 목록</h4>
            <ol><!-- Order list -->
                <li>서울</li>
                <li>대전</li>
                <li>대구</li>
                <li>부산</li>
                <li>광주</li>
            </ol>
    </body>
</html>
