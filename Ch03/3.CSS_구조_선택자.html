<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        *{
            background-color: black;
            color: white;
        }
        .city>li:first-child{
            color: aquamarine;
        }
        .city>em:last-child{
            color: lightblue;
        }
        .city>li:nth-child(2){
            color: darkcyan;
        }
        .city>li:nth-child(4){
            color: darkgoldenrod;
        }
        .city>em:nth-of-type(1){
            color: orange;
        }
        ul:nth-child(3)>li:nth-child(1){
            background-color: lightcoral;
        }
        ul:nth-of-type(2)>li:nth-child(2){
            background-color: lightgreen;
        }

    </style>
</head>
<body>
    <h3>3. CSS 구조 선택자</h3>
    <ul class="city">
        <li>서울</li>
        <li>대전</li>
        <li>대구</li>
        <li>부산</li>
        <li>광주</li>
        <em>인천</em><br>
        <em>울산</em><br>
        <em>세종</em>
    </ul>
    <ul>
        <li>한국</li>
        <li>미국</li>
        <li>일본</li>
        <li>중국</li>
    </ul>
</body>
</html>
