<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>css 배경속성 실습</title>
        <style>
            .box1{
                width: 100%;
                height: 200px;
                border: 1px black solid;
                margin: 0 0 10px 0;
            }
            .box2{
                width: 100%;
                height: 200px;
                border: 1px black solid;
                margin: 0 0 10px 0;
            }
            .box3{
                width: 100%;
                height: 200px;
                border: 1px black solid;
                margin: 0 0 10px 0;
            }
            .box1-1{
                background-image: url(../Day1/images/Flower1.jpg);
            }
            .box1-2{
                background-image: url(/Day1/images/Flower2.jpg);
            }
            .box1-3{
                background-image: url(../images2/Flower3.jpg);
            }
            .box2-1{
                background-image: url(../images2/Flower3.jpg);
                background-size: 100px;
            }
            .box2-2{
                background-image: url(../images2/Flower3.jpg);
                background-size: 100px 100px;
            }
            .box2-3{
                background-image: url(../images2/Flower3.jpg);
                background-size: 100% 100%;
            }
            .box3-1{
                background-image: url(../images2/Flower3.jpg);
                background-size: 100px;
                background-repeat: repeat-y;
            }
            .box3-2{
                background-image: url(../images2/Flower3.jpg);
                background-size: 100px 100px;
                background-repeat: repeat-x;
            }
            .box3-3{
                background-image: url(../images2/Flower3.jpg);
                background-size: 100% 100%;
                background-repeat: no-repeat;
            }

        </style>
    </head>
    <body>
        <h3>css 배경속성 실습</h3>

        <h4>background-image</h4>
        <section>
            <div class="box1 box1-1"></div>
            <div class="box1 box1-2"></div>
            <div class="box1 box1-3"></div>
        </section>
        
        <h4>background-size</h4>
        <section>
            <div class="box2 box2-1"></div>
            <div class="box2 box2-2"></div>
            <div class="box2 box2-3"></div>
        </section>
        
        <h4>background-repeat</h4>
        <section>
            <div class="box3 box3-1"></div>
            <div class="box3 box3-2"></div>
            <div class="box3 box3-3"></div>
        </section>
    </body>
</html>
