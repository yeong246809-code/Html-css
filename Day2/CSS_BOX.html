<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>CSS 박스 속성 실습</title>
        <style>
            .sec1>.box1{
                width: 100px;
                height: 100px;
                background-color: lightgreen;
                /* color: aliceblue; */
            }
            .sec1>.box2{
                width: 400px;
                height: 50px;
                background-color: yellow;
            }
            .sec1>.box3{
                width: 50%;
                height: 100px;
                background-color: red;
            }
            .sec2>div{
                width: 100px;
                height: 100px;
                background-color: bisque;
                /* margin-bottom: 1px; */
            }
            .sec2>.box1{
                background-color: tomato;
                margin: 10px;
                padding: 10px;
            }
            .sec2>.box2{
                background-color: orange;
                margin: 10px 20px;
                padding: 10px 20px;
            }
            .sec2>.box3{
                background-color: lightcoral;
                margin: 10px 20px 30px;
                padding: 10px 20px 30px;
            }
            .sec2>.box4{
                background-color: lightblue;
                margin: 10px 20px 30px 40px;
                padding: 10px 20px 30px 40px;
            }
            .sec2>.box5{
                margin-top: 10px;
                margin-bottom: 30px;
                margin-left: 40px;
                margin-right: 20px;
                
                padding-bottom: 30px;
                padding-top: 10px;
                padding-right: 20px;
                padding-left: 40px;

                background-color: gold;
                               
            }
            /* 크기를 갖는 box를 브라우저 가운데로 위치 시키는 margin 처리 */
            .sec2>.box6{
                background-color: green;
                margin: 0 auto;
            }
            .sec3>div{
                width: 100px;
                height: 100px;
            }
            .sec3>.box1{
                background-color: greenyellow;
                border-width: 1px;
                border-style: solid;
                border-color: red;
            }
            .sec3>.box2{
                background-color: green;
                border-width: 1px;
                border-style: solid;
                border-color: blue;
            }
            .sec3>.box3{
                background-color: yellow;
                border: 1px solid black;
            }

        </style>
    </head>
    <body>
        <h3>css 박스속성 실습</h3>
        <h4>width,heith 속성</h4>
        <section class="sec1">
            <div class="box1">1</div>
            <div class="box2">2</div>
            <div class="box3">3</div>
        </section>

        <h4>margin,padding 속성</h4>
        <section class="sec2">
            <div class="box1">1</div>
            <div class="box2">2</div>
            <div class="box3">3</div>
            <div class="box4">4</div>
            <div class="box5">5</div>
            <div class="box6">6</div>
        </section>
        
        <h4>border 속성</h4>
        <section class="sec3">
            <div class="box1">1</div>
            <div class="box2">2</div>
            <div class="box3">3</div>
        </section>
    
    
    </body>
</html>
