<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            background-color: black;
            color: white;
            margin: 0;
            padding: 0;
            
        }
        div{
            width: 50%;
            display: flex;
            justify-content: center;
            background-color: burlywood;
            
        }

    </style>
</head>
<body>
    <h3>2.css 가시속성</h3>

    <div class="box1">
        <span>span1</span>
        <div>div2</div>
        <span>span3</span>
    </div>

        <span>span1</span>
        <div>div2</div>
        <span>span3</span>
    </div>

        <div class="box3">
        <span>span1</span>
        <div>div2</div>
        <span>span3</span>
    </div>
    <h4>display: none</h4>
        <div class="box4">
        <span>span1</span>
        <div>div2</div>
        <span>span3</span>
    </div>
    <h4>display: overflow</h4>
        <div class="box5">
        <span>span1</span>
        <div>div2</div>
        <span>span3</span>
    </div>

</html>
