<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            background-color: black;
            color: white;
        }
        div{
            display: inline-block;
            width: 100px;
            height: 100px;
            background-color: bisque;
            color: black;
        }
        section:nth-of-type(1)>div:nth-child(1){
            width: 50px;
            height: 50px;
        }
        section:nth-of-type(1)>div:nth-child(2){
            width: 10%;
            height: 100px;
        }
        section:nth-of-type(1)>div:nth-child(3){
            width: 50%;
            height: 100px;
        }
        section:nth-of-type(2)>div:nth-child(1){
            margin: 10px;
            padding: 10px;
            box-sizing: border-box;
        }
        section:nth-of-type(2)>div:nth-child(2){
            margin: 10px 20px 30px;
            padding: 10px 20px 30px;

        }
        section:nth-of-type(2)>div:nth-child(3){
            margin: 10px;
            padding: 10px;

        }
        section:nth-of-type(2)>div:nth-child(4){
            margin-top: 10px;
            margin-bottom: 20px;
            margin-left: 30px;
            margin-right: 40px;
            padding-top: 10px;
            padding-bottom: 20px;
            padding-left: 30px;
            padding-right: 40px;
            box-sizing: border-box;
            font-weight: 50px;

        }
        section:nth-of-type(2)>div:nth-child(5){
            margin: 10px;
            padding: 10px;

        }
        section:nth-of-type(2)>div:nth-child(6){
            display: block;
            margin: 0 auto;
        }
        section:nth-of-type(3)>div:nth-child(1){
            border: 5px red solid;
        }
        section:nth-of-type(3)>div:nth-child(2){
            border: 5px orange dotted;
        }
        section:nth-of-type(3)>div:nth-child(3){
            border: 5px blue dashed;
        }
        section:nth-of-type(4)>div:nth-child(1){
            width: 150px;
            height: 150px;
            margin: 10px;
            padding: 10px;
            box-sizing: border-box;
        }
        section:nth-of-type(4)>div:nth-child(2){
            width: 100px;
            height: 100px;
            margin: 10px;
            padding: 10px;
            box-sizing: border-box;
        }
        section:nth-of-type(4)>div:nth-child(3){
            width: 100px;
            height: 100px;
            margin: 10px;
            padding: 10px;
            border: 10px lightcoral solid; 
            box-sizing: border-box;
        }

    </style>
</head>
<body>
    <h3>1.css 박스속성</h3>
    <h4>width,height</h4>
    <section>
        <div>1</div>
        <div>2</div>
        <div>3</div>
    </section>
    <h4>margin,padding</h4>
    <section>
        <div>1</div>
        <div>2</div>
        <div>3</div>
        <div>1</div>
        <div>2</div>
        <div>3</div>
    </section>
    <h4>border</h4>
    <section>
        <div>1</div>
        <div>2</div>
        <div>3</div>
    </section>
    <h4>box-sizing</h4>
    <section>
        <div>1</div>
        <div>2</div>
        <div>3</div>
    </section>

</body>
</html>
